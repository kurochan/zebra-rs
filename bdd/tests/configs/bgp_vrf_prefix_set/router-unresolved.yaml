vrf:
- name: vrf-blue
interface:
- if-name: peer-a
  vrf: vrf-blue
  ipv4:
    address: 192.0.2.1/30
  ipv6:
    address: 2001:db8:12::1/64
- if-name: peer-b
  vrf: vrf-blue
  ipv4:
    address: 192.0.2.5/30
  ipv6:
    address: 2001:db8:23::1/64
prefix-set:
- name: PEER-IN-V4
  prefixes:
  - prefix: 198.51.100.0/24
  - prefix: 203.0.113.0/24
    le: 32
- name: PEER-IN-V6
  prefixes:
  - prefix: 2001:db8:100::/48
  - prefix: 2001:db8:200::/48
    le: 128
router:
  bgp:
    global:
      as: 65001
      router-id: 192.0.2.1
    vrf:
    - name: vrf-blue
      rd: 65001:100
      neighbor:
      - remote-address: 192.0.2.2
        remote-as: 65002
        afi-safi:
        - name: ipv4
          enabled: true
          prefix-set:
            in: PEER-IN-V4
        - name: ipv6
          enabled: true
          prefix-set:
            in: PEER-IN-V6
      - remote-address: 192.0.2.6
        remote-as: 65003
        afi-safi:
        - name: ipv4
          enabled: true
          prefix-set:
            in: PEER-IN-V4
            out: MISSING
        - name: ipv6
          enabled: true
          prefix-set:
            in: PEER-IN-V6
            out: MISSING6
