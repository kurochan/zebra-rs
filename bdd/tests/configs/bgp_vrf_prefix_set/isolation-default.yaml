interface:
- if-name: iso-router
  ipv4:
    address: 192.0.2.10/30
router:
  bgp:
    global:
      as: 65100
      router-id: 192.0.2.10
    neighbor:
    - remote-address: 192.0.2.9
      remote-as: 65001
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: ipv4
        enabled: true
    afi-safi:
    - name: ipv4
      network:
      - prefix: 10.10.0.0/24
      - prefix: 10.10.99.0/24
